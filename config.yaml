# BatteryPlot active configuration
# Edit paths and cell parameters for your data.

# --- Directories ---
input_dir: input
output_dir: output

# --- Cell parameters (optional but recommended) ---
# nominal_capacity_ah: 0.003
# active_mass_g: 0.019
# electrode_area_cm2: 1.13
# density_g_cm3: 2.7

# --- Plot selection ---
representative_cycles: null
selected_plot_families:
  - voltage_profiles
  - cycle_summary
  - rate_capability
  - pulse_resistance
  - ragone
  - qa

# --- Output ---
output_formats:
  - svg
  - pdf
overwrite: true

# --- Styling ---
theme: publication

# --- Parsing ---
header_search_rows: 10
min_numeric_fraction: 0.5

# --- Logging ---
log_level: INFO
